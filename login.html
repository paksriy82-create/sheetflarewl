<!DOCTYPE html>
<html lang="id">
<head>
    <script>
        // Gunakan replace agar tidak masuk ke history browser (mencegah user nyangkut saat klik tombol Back)
        if(sessionStorage.getItem('user_email')) window.location.replace('/dashboard');
    </script>

    <script src="config.js?v=2026"></script>
    
    <script>
        (function() {
            const cachedStr = localStorage.getItem('melimpah_global_settings');
            if (cachedStr) {
                try {
                    const data = JSON.parse(cachedStr).data;
                    if(data.site_favicon) {
                        let link = document.querySelector("link[rel~='icon']");
                        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                        link.href = data.site_favicon;
                    }
                    if(data.site_name) {
                        // FIX: Cegah judul numpuk
                        if (!document.title.includes(data.site_name)) {
                            document.title = "Otentikasi Member - " + data.site_name;
                        }
                        const updateDomElements = () => {
                            document.querySelectorAll('.dyn-site-name').forEach(el => {
                                el.innerText = data.site_name;
                            });
                        };
                        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', updateDomElements); } else { updateDomElements(); }
                    }
                } catch(e){}
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otentikasi Member</title>
    
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CUSTOM TOAST CSS */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; color: white; opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); max-width: 350px; line-height: 1.4; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.warning { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast-container"></div>

    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-lg border border-slate-100 transition-all duration-300">
        
        <h1 class="text-2xl font-black text-slate-800 mb-2 text-center uppercase tracking-tighter">
            <span id="form-title">Login</span> <span class="dyn-site-name text-indigo-600">Member</span>
        </h1>
        <p id="form-subtitle" class="text-center text-slate-400 text-xs mb-8">Silakan masuk untuk akses dashboard.</p>
        
        <div id="view-login" class="fade-in">
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Email</label>
                    <input type="email" id="email" class="w-full p-4 bg-[#ebf2ff] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700" placeholder="nama@email.com" required>
                </div>
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Password</label>
                    <input type="password" id="pass" class="w-full p-4 bg-[#ebf2ff] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btn-login" class="mt-2 w-full bg-indigo-600 text-white p-5 rounded-2xl font-black shadow-xl shadow-indigo-200 hover:scale-[1.02] transition-all uppercase text-xs tracking-widest">Otentikasi Akun</button>
            </form>
            
            <div class="mt-8 text-center text-xs font-bold text-slate-500">
                Belum punya akun? <button onclick="toggleView('register')" class="text-indigo-600 hover:text-indigo-800 uppercase tracking-widest ml-1 transition-colors">Daftar Di Sini</button>
            </div>
        </div>

        <div id="view-register" class="hidden">
            <form id="form-register" class="space-y-4">
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Nama Lengkap</label>
                    <input type="text" id="reg-nama" class="w-full p-4 bg-[#f1f5f9] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700 placeholder:font-normal" placeholder="Budi Santoso" required>
                </div>
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Alamat Email</label>
                    <input type="email" id="reg-email" class="w-full p-4 bg-[#f1f5f9] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700 placeholder:font-normal" placeholder="budi@email.com" required>
                </div>
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Nomor WhatsApp</label>
                    <input type="tel" id="reg-wa" class="w-full p-4 bg-[#f1f5f9] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700 placeholder:font-normal" placeholder="62812xxxx" required>
                </div>
                <div>
                    <label class="ml-2 text-[10px] font-bold text-slate-400 uppercase">Buat Password</label>
                    <input type="password" id="reg-pass" class="w-full p-4 bg-[#f1f5f9] rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all font-bold text-slate-700 placeholder:font-normal" placeholder="Minimal 6 karakter" minlength="6" required>
                </div>
                <button type="submit" id="btn-register" class="mt-2 w-full bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl shadow-slate-200 hover:scale-[1.02] transition-all uppercase text-xs tracking-widest">Buat Akun Member</button>
            </form>

            <div class="mt-8 text-center text-xs font-bold text-slate-500">
                Sudah punya akun? <button onclick="toggleView('login')" class="text-indigo-600 hover:text-indigo-800 uppercase tracking-widest ml-1 transition-colors">Login Di Sini</button>
            </div>
        </div>

    </div>
    
    <div class="mt-6 text-center">
        <a href="/" class="text-slate-400 text-xs font-bold hover:text-indigo-600 transition-colors">&larr; Kembali ke Beranda</a>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) { localStorage.setItem('melimpah_affiliate', ref); }
        })();
    </script>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            // Re-render icons for dynamic toasts
            let icon = 'check-circle';
            if (type === 'error') icon = 'x-circle';
            if (type === 'warning') icon = 'alert-triangle';

            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0"></i> <span>${message}</span>`;
            container.appendChild(toast);
            if (typeof lucide !== 'undefined') lucide.createIcons({ root: toast });

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleView(view) {
            const viewLogin = document.getElementById('view-login');
            const viewRegister = document.getElementById('view-register');
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');

            if (view === 'register') {
                viewLogin.classList.add('hidden');
                viewLogin.classList.remove('fade-in');
                viewRegister.classList.remove('hidden');
                viewRegister.classList.add('fade-in');
                
                formTitle.innerText = 'Daftar';
                formSubtitle.innerText = 'Buat akun gratis untuk mulai mengakses katalog.';
            } else {
                viewRegister.classList.add('hidden');
                viewRegister.classList.remove('fade-in');
                viewLogin.classList.remove('hidden');
                viewLogin.classList.add('fade-in');
                
                formTitle.innerText = 'Login';
                formSubtitle.innerText = 'Silakan masuk untuk akses dashboard.';
            }
        }

        // --- PROSES SUBMIT LOGIN ---
        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); 
            const originalText = btn.innerText;

            if(typeof SCRIPT_URL === 'undefined' || SCRIPT_URL === 'ISI_DENGAN_LINK_WEB_APP_GOOGLE_SCRIPT_ANDA_DISINI') {
                showToast("Sistem belum dikonfigurasi. Harap isi config.js", "error");
                return;
            }

            btn.innerText = 'MEMVERIFIKASI...'; btn.disabled = true;

            try {
                const targetUrl = SCRIPT_URL;
                const res = await fetch(targetUrl, { 
                    method: 'POST', body: JSON.stringify({ action: 'login', email: document.getElementById('email').value, password: document.getElementById('pass').value })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    sessionStorage.setItem('user_email', r.data.email);
                    sessionStorage.setItem('user_nama', r.data.nama);
                    sessionStorage.setItem('user_id', r.data.id); 
                    
                    showToast("Login Berhasil! Mengalihkan...", "success");
                    
                    setTimeout(() => { window.location.replace('/dashboard'); }, 1000);
                } else { 
                    showToast(r.message, "error"); 
                    btn.innerText = originalText; btn.disabled = false;
                }
            } catch (err) { 
                showToast('Gagal koneksi server!', 'error'); 
                btn.innerText = originalText; btn.disabled = false; 
            }
        };

        // --- PROSES SUBMIT DAFTAR MEMBER BARU ---
        document.getElementById('form-register').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-register'); 
            const originalText = btn.innerText;

            if(typeof SCRIPT_URL === 'undefined' || SCRIPT_URL === 'ISI_DENGAN_LINK_WEB_APP_GOOGLE_SCRIPT_ANDA_DISINI') {
                showToast("Sistem belum dikonfigurasi. Harap isi config.js", "error");
                return;
            }

            btn.innerText = 'MEMBUAT AKUN...'; btn.disabled = true;

            const pData = {
                action: 'register_member', 
                nama: document.getElementById('reg-nama').value,
                email: document.getElementById('reg-email').value,
                whatsapp: document.getElementById('reg-wa').value,
                password: document.getElementById('reg-pass').value,
                affiliate: localStorage.getItem('melimpah_affiliate') || "-" 
            };

            try {
                const targetUrl = SCRIPT_URL;
                const res = await fetch(targetUrl, { 
                    method: 'POST', body: JSON.stringify(pData)
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    showToast("Akun Berhasil Dibuat! Silakan Login.", "success");
                    document.getElementById('form-register').reset();
                    document.getElementById('email').value = pData.email;
                    
                    setTimeout(() => { toggleView('login'); }, 1500);
                } else { 
                    showToast(r.message || "Gagal membuat akun.", "error"); 
                }
            } catch (err) { 
                showToast('Gagal koneksi server!', 'error'); 
            } finally {
                btn.innerText = originalText; btn.disabled = false; 
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
