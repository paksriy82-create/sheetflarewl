<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotAdmin V13.0 - LMS Edition</title>
    <script src="config.js?v=2026"></script>
    <script src="engine.js?v=2026"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script> 
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; } 
        #admin-main { display: none; }
        .nav-item.active { background: #4f46e5; color: white; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8f9fa] relative">

    <div id="admin-main" class="flex h-screen w-screen overflow-hidden" style="display: flex;">
        <aside id="sidebar" class="w-72 bg-slate-900 text-slate-400 flex flex-col h-full flex-shrink-0 shadow-2xl relative">
            <div class="p-8 text-2xl font-black text-white tracking-tighter border-b border-slate-800 flex justify-between items-center">
                <span>SPOTADMIN</span>
            </div>
            <nav class="p-6 space-y-2 flex-1 overflow-y-auto custom-scroll">
                <button onclick="switchTab('orders')" id="nav-orders" class="nav-item active w-full flex items-center gap-3 p-4 font-bold text-sm"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
                <button onclick="switchTab('products')" id="nav-products" class="nav-item w-full flex items-center gap-3 p-4 font-bold text-sm"><i data-lucide="package" class="w-5 h-5"></i> Produk</button>
                <button onclick="switchTab('lms')" id="nav-lms" class="nav-item w-full flex items-center gap-3 p-4 font-bold text-sm bg-indigo-900/30 text-indigo-300 border border-indigo-500/20 mb-4"><i data-lucide="graduation-cap" class="w-5 h-5"></i> LMS Creator</button>
                
                <button onclick="switchTab('pages')" id="nav-pages" class="nav-item w-full flex items-center gap-3 p-4 font-bold text-sm"><i data-lucide="file-text" class="w-5 h-5"></i> Halaman CMS</button>
                <button onclick="switchTab('settings')" id="nav-settings" class="nav-item w-full flex items-center gap-3 p-4 font-bold text-sm border-t border-slate-800 pt-8 mt-5"><i data-lucide="settings" class="w-5 h-5"></i> Pengaturan</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto h-full p-10 custom-scroll bg-[#f8f9fa]">
            
            <div id="tab-lms" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tight">LMS Creator</h2>
                        <p class="text-slate-400 text-sm">Kelola materi ecourse terenkripsi.</p>
                    </div>
                    <button onclick="openLmsModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:scale-105 transition-all text-xs uppercase tracking-widest">+ Setup Materi</button>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                            <tr>
                                <th class="p-6">Produk</th>
                                <th class="p-6">Judul Materi</th>
                                <th class="p-6">Link Sakti LMS</th>
                                <th class="p-6">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="list-lms" class="divide-y text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="tab-orders" class="tab-content active">...</div>
            <div id="tab-products" class="tab-content">...</div>
            </main>
    </div>

    <div id="modal-lms" class="fixed inset-0 bg-slate-900/80 hidden z-[300] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black mb-8 italic text-slate-800">Konfigurasi Materi LMS</h3>
            <form id="form-lms" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Pilih Produk</label>
                    <select id="lms-product-id" class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-slate-700" required>
                        </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Judul Materi</label>
                    <input type="text" id="lms-title" placeholder="Contoh: Modul 1 - Rahasia Iklan Murah" class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest ml-1 mb-2 block">ID Video YouTube (Hanya ID-nya saja)</label>
                    <input type="text" id="lms-video" placeholder="Contoh: dQw4w9WgXcQ" class="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-xl outline-none font-mono text-sm" required>
                    <p class="text-[9px] text-slate-400 mt-2">*ID Video adalah kode setelah v= di link YouTube.</p>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Deskripsi / Tugas Materi</label>
                    <textarea id="lms-desc" class="w-full p-4 bg-slate-50 border rounded-xl outline-none h-32 text-sm" placeholder="Tulis instruksi atau link download disini..."></textarea>
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal('modal-lms')" class="flex-1 p-4 font-bold text-slate-400 uppercase text-xs">Batal</button>
                    <button type="submit" class="flex-[2] bg-indigo-600 text-white p-5 rounded-xl font-black shadow-lg uppercase text-xs">Simpan & Generate Link</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            lucide.createIcons();
        }
        function openLmsModal() { document.getElementById('modal-lms').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        lucide.createIcons();
    </script>
</body>
</html>
